<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataLens - 智慧型資料表格閱讀器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- 加入 SheetJS 用於匯出 Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }

        /* 自定義滾動條 - 優化觸控與點擊體驗 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 6px;
            border: 3px solid #f1f1f1; /* 增加邊距感 */
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .sort-icon {
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        th:hover .sort-icon {
            opacity: 1;
        }
        th.sorted-asc .sort-icon, th.sorted-desc .sort-icon {
            opacity: 1;
            color: #4f46e5;
        }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sticky-left-shadow {
            box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1);
        }

        .toast-enter { transform: translate(-50%, 1rem); opacity: 0; }
        .toast-enter-active { transform: translate(-50%, 0); opacity: 1; }
    </style>
    <!-- 動態欄位隱藏樣式 -->
    <style id="colVisStyles"></style>
</head>
<body class="text-gray-800 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white shadow-sm z-20 flex-none">
        <div class="mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center w-full">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md">
                    <i class="fas fa-table fa-lg"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-900 tracking-tight">DataLens <span class="hidden sm:inline text-sm font-normal text-gray-500 ml-2">CSV/JSON 轉表格工具</span></h1>
            </div>
            <div class="text-xs sm:text-sm text-gray-500 flex items-center">
                <span class="hidden sm:inline">支援 CSV/JSON・智慧解析・多表切換</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col p-3 sm:p-6 overflow-hidden w-full space-y-3 sm:space-y-4">
        
        <!-- Controls Section -->
        <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100 flex-none space-y-4">
            
            <!-- Input Area -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- File Upload -->
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-4 sm:p-6 flex flex-col justify-center items-center cursor-pointer hover:bg-gray-50 transition-colors group" id="dropZone">
                    <input type="file" id="fileInput" accept=".csv,.txt,.json" class="hidden">
                    <div class="bg-indigo-50 p-3 rounded-full mb-3 group-hover:scale-110 transition-transform duration-200">
                        <i class="fas fa-cloud-upload-alt text-2xl text-indigo-500"></i>
                    </div>
                    <p class="text-sm font-medium text-gray-700 text-center">點擊上傳或拖放檔案</p>
                    <p class="text-xs text-gray-400 mt-1">支援 .csv, .txt, .json</p>
                </div>

                <!-- Text Paste & Settings -->
                <div class="flex flex-col space-y-3">
                    <textarea id="pasteInput" placeholder="在此貼上 CSV 文字或 JSON 資料..." class="w-full h-24 p-3 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 resize-none font-mono custom-scrollbar"></textarea>
                    
                    <div class="flex flex-wrap gap-2 items-center">
                        <!-- Encoding (CSV only) -->
                        <div class="relative flex-grow sm:flex-grow-0">
                            <select id="encodingSelect" class="w-full text-sm border-gray-300 border rounded-md shadow-sm pl-3 pr-8 py-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white appearance-none cursor-pointer">
                                <option value="UTF-8">UTF-8 (通用)</option>
                                <option value="Big5">Big5 (繁中 CSV)</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                <i class="fas fa-chevron-down text-xs"></i>
                            </div>
                        </div>

                        <!-- Delimiter (CSV only) -->
                        <div class="relative flex-grow sm:flex-grow-0">
                            <select id="delimiterSelect" class="w-full text-sm border-gray-300 border rounded-md shadow-sm pl-3 pr-8 py-2 focus:ring-indigo-500 focus:border-indigo-500 bg-white appearance-none cursor-pointer">
                                <option value=",">逗號 (,)</option>
                                <option value="tab">Tab</option>
                                <option value=" ">空白</option>
                                <option value=";">分號 (;)</option>
                                <option value="|">管線 (|)</option>
                                <option value="custom">自訂...</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                <i class="fas fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                        <input type="text" id="customDelimiter" placeholder="自訂符號" class="hidden w-24 text-sm border-gray-300 border rounded-md shadow-sm px-2 py-2 focus:ring-indigo-500 focus:border-indigo-500 text-center font-mono">

                        <!-- Header Check (CSV only) -->
                        <label class="flex items-center space-x-2 text-sm text-gray-700 cursor-pointer select-none bg-white border border-gray-300 rounded-md px-3 py-2 shadow-sm hover:bg-gray-50 whitespace-nowrap" id="headerCheckContainer">
                            <input type="checkbox" id="headerCheck" checked class="rounded text-indigo-600 focus:ring-indigo-500 h-4 w-4 cursor-pointer">
                            <span>首行標題</span>
                        </label>

                        <button id="convertBtn" class="flex-grow bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white px-4 py-2 rounded-md text-sm font-medium transition-colors shadow-sm whitespace-nowrap flex items-center justify-center">
                            <i class="fas fa-magic mr-2"></i>轉換
                        </button>
                    </div>
                </div>
            </div>

            <!-- Toolbar (Hidden by default) -->
            <div id="toolbar" class="hidden border-t pt-3 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-3">
                
                <!-- Search & Column Control Group -->
                <div class="flex items-center gap-2 w-full lg:w-auto flex-grow lg:flex-grow-0">
                    <!-- Search -->
                    <div class="relative w-full lg:w-64">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-search text-gray-400"></i>
                        </div>
                        <input type="text" id="searchInput" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="搜尋內容...">
                    </div>

                    <!-- Column Visibility Button & Dropdown -->
                    <div class="relative">
                        <button id="colVisBtn" class="bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 px-3 py-2 rounded-md text-sm font-medium shadow-sm flex items-center h-[38px]" title="欄位設定">
                            <i class="fas fa-columns mr-1"></i> <span class="hidden sm:inline">欄位</span>
                        </button>
                        <div id="colVisMenu" class="hidden absolute left-0 sm:left-auto sm:right-0 mt-2 w-56 bg-white border border-gray-200 rounded-md shadow-lg z-50 max-h-80 overflow-y-auto custom-scrollbar p-2">
                            <div class="text-xs font-semibold text-gray-500 mb-2 px-1">顯示/隱藏欄位</div>
                            <div id="colVisOptions" class="space-y-1">
                                <!-- Checkboxes injected here -->
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Info & Selectors -->
                <div class="flex flex-wrap items-center gap-2 w-full lg:w-auto justify-end">
                    <!-- JSON Table Selector (Hidden by default) -->
                    <div id="tableSelectorContainer" class="hidden flex items-center bg-yellow-50 border border-yellow-200 rounded-md px-2 py-1">
                        <span class="text-xs font-semibold text-yellow-700 mr-2 whitespace-nowrap"><i class="fas fa-database mr-1"></i>資料來源:</span>
                        <select id="tableSelector" class="text-sm bg-transparent border-none text-yellow-800 font-medium focus:ring-0 cursor-pointer py-1 pr-6 truncate max-w-[150px] sm:max-w-[200px]">
                            <!-- Options injected here -->
                        </select>
                    </div>

                    <span id="recordCount" class="text-sm text-gray-600 whitespace-nowrap mx-1">0 筆</span>
                    
                    <span id="formatTag" class="px-2 py-0.5 rounded text-xs font-semibold bg-gray-200 text-gray-600 whitespace-nowrap hidden sm:inline-block">未知</span>
                    
                    <div class="border-l border-gray-300 h-6 mx-1 hidden sm:block"></div>

                    <!-- Action Buttons -->
                    <div class="flex items-center gap-1">
                        <button onclick="document.getElementById('fileInput').click()" class="text-indigo-600 hover:bg-indigo-50 px-2 py-1 rounded text-sm font-medium whitespace-nowrap" title="重選檔案">
                            <i class="fas fa-folder-open sm:hidden"></i><span class="hidden sm:inline">重選</span>
                        </button>

                        <button id="exportBtn" class="text-green-600 hover:bg-green-50 px-2 py-1 rounded text-sm font-medium whitespace-nowrap" title="匯出為 Excel">
                            <i class="fas fa-file-excel"></i>
                        </button>

                        <button id="exportCsvBtn" class="text-blue-600 hover:bg-blue-50 px-2 py-1 rounded text-sm font-medium whitespace-nowrap" title="匯出為 CSV">
                            <i class="fas fa-file-csv"></i>
                        </button>

                        <button id="exportJsonBtn" class="text-purple-600 hover:bg-purple-50 px-2 py-1 rounded text-sm font-medium whitespace-nowrap" title="匯出為 JSON">
                            <i class="fas fa-file-code"></i>
                        </button>

                        <button id="exportMdBtn" class="text-gray-600 hover:bg-gray-100 px-2 py-1 rounded text-sm font-medium whitespace-nowrap" title="複製為 Markdown">
                            <i class="fab fa-markdown"></i>
                        </button>

                        <button id="clearBtn" class="text-red-500 hover:bg-red-50 px-2 py-1 rounded text-sm font-medium whitespace-nowrap ml-1" title="清空資料">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Table Display Area -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 flex-grow overflow-hidden relative flex flex-col">
            
            <div id="loader" class="loader absolute inset-0 m-auto z-50"></div>
            
            <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 p-4 text-center">
                <div class="bg-gray-50 p-4 rounded-full mb-4">
                    <i class="fas fa-table text-4xl sm:text-5xl text-gray-300"></i>
                </div>
                <p class="text-lg font-medium text-gray-500">準備就緒</p>
                <p class="text-sm">請上傳 CSV 或貼上 JSON 資料以開始檢視</p>
            </div>

            <!-- Table Container: Critical for scrolling -->
            <div class="overflow-auto flex-grow custom-scrollbar w-full h-full relative" id="tableContainer">
                <table class="min-w-full divide-y divide-gray-200 hidden border-separate border-spacing-0" id="dataTable">
                    <thead class="bg-gray-50 sticky top-0 z-30 shadow-sm">
                        <tr id="tableHeader">
                            <!-- Headers -->
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="tableBody">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    
    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-gray-800/90 backdrop-blur-sm text-white px-4 py-2 rounded-full shadow-lg transition-all duration-300 opacity-0 pointer-events-none z-50 text-sm flex items-center">
        <i class="fas fa-check-circle text-green-400 mr-2"></i>
        <span id="toastMsg">已複製</span>
    </div>

    <script>
        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const pasteInput = document.getElementById('pasteInput');
        const convertBtn = document.getElementById('convertBtn');
        const encodingSelect = document.getElementById('encodingSelect');
        const headerCheck = document.getElementById('headerCheck');
        const tableContainer = document.getElementById('tableContainer');
        const dataTable = document.getElementById('dataTable');
        const tableHeader = document.getElementById('tableHeader');
        const tableBody = document.getElementById('tableBody');
        const emptyState = document.getElementById('emptyState');
        const toolbar = document.getElementById('toolbar');
        const searchInput = document.getElementById('searchInput');
        const recordCount = document.getElementById('recordCount');
        const formatTag = document.getElementById('formatTag');
        const loader = document.getElementById('loader');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        const tableSelector = document.getElementById('tableSelector');
        const tableSelectorContainer = document.getElementById('tableSelectorContainer');
        const clearBtn = document.getElementById('clearBtn');
        const exportBtn = document.getElementById('exportBtn');
        const exportCsvBtn = document.getElementById('exportCsvBtn');
        const exportJsonBtn = document.getElementById('exportJsonBtn');
        const exportMdBtn = document.getElementById('exportMdBtn');
        const colVisBtn = document.getElementById('colVisBtn');
        const colVisMenu = document.getElementById('colVisMenu');
        const colVisOptions = document.getElementById('colVisOptions');
        const colVisStyles = document.getElementById('colVisStyles');
        const delimiterSelect = document.getElementById('delimiterSelect');
        const customDelimiter = document.getElementById('customDelimiter');

        let currentData = [];
        let headers = [];
        let sortCol = -1;
        let sortAsc = true;
        let toastTimeout;
        let detectedArrays = {}; 
        const STORAGE_KEY = 'datalens_raw_data';
        let hiddenColumns = new Set(); // Track hidden column indices

        // --- Event Listeners ---

        window.addEventListener('DOMContentLoaded', () => {
            const stored = sessionStorage.getItem(STORAGE_KEY);
            if (stored) {
                pasteInput.value = stored;
                detectAndProcess(stored, false);
                showToast('已還原上次的資料 (Session)');
            }
        });

        // Close ColVis menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!colVisBtn.contains(e.target) && !colVisMenu.contains(e.target)) {
                colVisMenu.classList.add('hidden');
            }
        });

        colVisBtn.addEventListener('click', () => {
            colVisMenu.classList.toggle('hidden');
        });

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('bg-indigo-50', 'border-indigo-400'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('bg-indigo-50', 'border-indigo-400'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-50', 'border-indigo-400');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => { if (e.target.files.length) handleFile(e.target.files[0]); });

        delimiterSelect.addEventListener('change', () => {
            customDelimiter.classList.toggle('hidden', delimiterSelect.value !== 'custom');
        });

        convertBtn.addEventListener('click', () => {
            const text = pasteInput.value;
            if (text.trim()) detectAndProcess(text, true);
            else alert('請先上傳檔案或貼上內容');
        });

        searchInput.addEventListener('input', (e) => filterTable(e.target.value.toLowerCase()));
        
        tableSelector.addEventListener('change', (e) => {
            const key = e.target.value;
            if (detectedArrays[key]) {
                processJsonArray(detectedArrays[key], key);
            }
        });

        tableBody.addEventListener('click', (e) => {
            const td = e.target.closest('td');
            if (!td) return;
            const text = td.innerText;
            if (text) copyToClipboard(text);
        });

        clearBtn.addEventListener('click', () => {
            if (confirm('確定要清空目前的所有資料與暫存嗎？')) {
                sessionStorage.removeItem(STORAGE_KEY);
                resetUI();
                showToast('已清空所有資料');
            }
        });

        // --- Exports ---
        
        exportBtn.addEventListener('click', () => exportData('excel'));
        exportCsvBtn.addEventListener('click', () => exportData('csv'));
        exportJsonBtn.addEventListener('click', () => exportData('json'));
        exportMdBtn.addEventListener('click', () => exportData('md'));

        function exportData(type) {
            if (!currentData || currentData.length === 0) {
                alert('沒有資料可以匯出');
                return;
            }

            // Filter data based on visibility
            // We map indices 0..n, keep only those NOT in hiddenColumns
            const visibleIndices = headers.map((_, i) => i).filter(i => !hiddenColumns.has(i));
            
            if (visibleIndices.length === 0) {
                alert('沒有可見的欄位可以匯出');
                return;
            }

            // Create new headers and data arrays based on visible indices
            const exportHeaders = visibleIndices.map(i => headers[i]);
            const exportRows = currentData.map(row => visibleIndices.map(i => row[i]));
            
            const now = new Date();
            // Generate timestamp with seconds: YYYYMMDD_HHMMSS
            const timestamp = now.toISOString().slice(0,10).replace(/-/g,'') + '_' + 
                              now.getHours().toString().padStart(2,'0') + 
                              now.getMinutes().toString().padStart(2,'0') + 
                              now.getSeconds().toString().padStart(2,'0');
            let baseName = 'export_' + timestamp;
            
            if (!tableSelectorContainer.classList.contains('hidden')) {
                // If table selector is active, use the table name but still append timestamp for uniqueness
                // or just sanitize the table name. Let's keep it simple and use the sanitized table name + short timestamp if needed,
                // but user request specifically asked for seconds to avoid duplication.
                // Let's stick to the base name format or sanitized table name.
                // To safely avoid duplication even with same table name, appending timestamp is safer,
                // but usually user expects "tablename.csv".
                // Let's modify: if specific table, use `tablename_timestamp`
                const tableName = tableSelector.value.replace(/[^\w\u4e00-\u9fa5-_]/g, '_');
                baseName = `${tableName}_${timestamp}`;
            }

            try {
                if (type === 'excel') {
                    const ws = XLSX.utils.aoa_to_sheet([exportHeaders, ...exportRows]);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Data");
                    XLSX.writeFile(wb, `${baseName}.xlsx`);
                    showToast('已匯出 Excel');
                } else if (type === 'csv') {
                    let csv = "\uFEFF"; // BOM
                    const escape = (val) => {
                        const s = String(val ?? '');
                        return (s.includes(',') || s.includes('"') || s.includes('\n')) ? `"${s.replace(/"/g, '""')}"` : s;
                    };
                    csv += exportHeaders.map(escape).join(',') + "\n";
                    exportRows.forEach(row => {
                        csv += row.map(escape).join(',') + "\n"; // row is already ordered by visibleIndices
                    });
                    downloadBlob(csv, `${baseName}.csv`, 'text/csv;charset=utf-8;');
                    showToast('已匯出 CSV');
                } else if (type === 'json') {
                    const jsonOutput = exportRows.map(row => {
                        const obj = {};
                        exportHeaders.forEach((h, i) => obj[h] = row[i]);
                        return obj;
                    });
                    downloadBlob(JSON.stringify(jsonOutput, null, 2), `${baseName}.json`, 'application/json');
                    showToast('已匯出 JSON');
                } else if (type === 'md') {
                    const makeRow = (arr) => '| ' + arr.map(c => String(c||'').replace(/\|/g, '\\|').replace(/\n/g, '<br>')).join(' | ') + ' |';
                    let md = makeRow(exportHeaders) + '\n';
                    md += '| ' + exportHeaders.map(() => '---').join(' | ') + ' |\n';
                    exportRows.forEach(row => md += makeRow(row) + '\n');
                    copyToClipboard(md);
                    showToast('已複製 Markdown');
                }
            } catch (err) {
                console.error(err);
                alert('匯出失敗');
            }
        }

        function downloadBlob(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function resetUI() {
            currentData = [];
            headers = [];
            detectedArrays = {};
            pasteInput.value = '';
            fileInput.value = '';
            searchInput.value = '';
            tableSelector.innerHTML = '';
            tableSelectorContainer.classList.add('hidden');
            colVisMenu.classList.add('hidden');
            colVisOptions.innerHTML = '';
            hiddenColumns.clear();
            updateColVisStyles();
            
            dataTable.classList.add('hidden');
            toolbar.classList.add('hidden');
            emptyState.style.display = 'flex';
        }

        function copyToClipboard(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                const len = text.length;
                const displayMsg = len > 20 ? text.substring(0, 20) + '...' : text;
                showToast(`已複製 (${len} 字)`);
            } catch (err) { showToast('複製失敗'); }
            document.body.removeChild(textarea);
        }

        function showToast(message) {
            toastMsg.innerText = message;
            toast.classList.remove('opacity-0', 'translate-y-4');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 2000);
        }

        // --- Processing Logic ---

        function handleFile(file) {
            loader.style.display = 'block';
            emptyState.style.display = 'none';
            const reader = new FileReader();
            reader.onload = (e) => {
                detectAndProcess(e.target.result, true);
                loader.style.display = 'none';
                fileInput.value = ''; 
            };
            reader.onerror = () => { alert('讀取失敗'); loader.style.display = 'none'; };
            reader.readAsText(file, encodingSelect.value);
        }

        function detectAndProcess(text, shouldSave = false) {
            const trimmed = text.trim();
            if (shouldSave) {
                try { sessionStorage.setItem(STORAGE_KEY, trimmed); } 
                catch (e) { showToast('檔案過大，無法暫存'); }
            }
            
            if (trimmed.startsWith('[') || trimmed.startsWith('{')) {
                try {
                    const json = JSON.parse(trimmed);
                    analyzeAndProcessJSON(json);
                    updateFormatTag('JSON');
                    return;
                } catch (e) { console.log('JSON Parse failed, trying CSV'); }
            }

            processCSV(text);
            updateFormatTag('CSV');
            tableSelectorContainer.classList.add('hidden');
        }

        function updateFormatTag(type) {
            formatTag.textContent = type;
            formatTag.className = type === 'JSON' 
                ? 'px-2 py-0.5 rounded text-xs font-semibold bg-green-100 text-green-700 whitespace-nowrap hidden sm:inline-block'
                : 'px-2 py-0.5 rounded text-xs font-semibold bg-blue-100 text-blue-700 whitespace-nowrap hidden sm:inline-block';
        }

        function analyzeAndProcessJSON(json) {
            detectedArrays = {};
            tableSelector.innerHTML = '';
            
            if (Array.isArray(json)) {
                detectedArrays['Root Data'] = json;
            } else if (typeof json === 'object' && json !== null) {
                const rootObject = {};
                Object.keys(json).forEach(key => {
                    const value = json[key];
                    rootObject[key] = value;
                    if (Array.isArray(value) && value.length > 0) {
                        detectedArrays[key] = value;
                    } else if (typeof value === 'object' && value !== null) {
                         Object.keys(value).forEach(subKey => {
                            if (Array.isArray(value[subKey]) && value[subKey].length > 0) {
                                detectedArrays[`${key}.${subKey}`] = value[subKey];
                            }
                         });
                    }
                });
                if (Object.keys(rootObject).length > 0) detectedArrays['摘要資訊 (Root)'] = [rootObject];
                if (Object.keys(detectedArrays).length === 0) detectedArrays['Root Object'] = [json];
            } else {
                alert('無效的 JSON');
                return;
            }

            let keys = Object.keys(detectedArrays);
            if (keys.includes('摘要資訊 (Root)')) {
                keys = ['摘要資訊 (Root)', ...keys.filter(k => k !== '摘要資訊 (Root)')];
            }

            let bestKey = keys[0];
            let maxScore = -1;

            keys.forEach(key => {
                const arr = detectedArrays[key];
                let colCount = 1;
                if (arr.length > 0 && typeof arr[0] === 'object' && arr[0] !== null) colCount = Object.keys(arr[0]).length;
                const score = arr.length * colCount;
                if (score > maxScore) { maxScore = score; bestKey = key; }
                const option = document.createElement('option');
                option.value = key;
                option.text = `${key} (${arr.length} 筆)`;
                tableSelector.appendChild(option);
            });

            if (detectedArrays['摘要資訊 (Root)']) bestKey = '摘要資訊 (Root)';

            if (keys.length > 1) {
                tableSelectorContainer.classList.remove('hidden');
                tableSelector.value = bestKey;
            } else {
                tableSelectorContainer.classList.add('hidden');
            }

            processJsonArray(detectedArrays[bestKey], bestKey);
        }

        function processJsonArray(dataArray, arrayName) {
            currentData = [];
            headers = [];
            hiddenColumns.clear(); // Reset visibility when switching tables
            updateColVisStyles();

            try {
                const headerSet = new Set();
                dataArray.forEach(item => {
                    if (typeof item === 'object' && item !== null) Object.keys(item).forEach(key => headerSet.add(key));
                    else headerSet.add("Value");
                });
                headers = Array.from(headerSet);
                currentData = dataArray.map(item => {
                    if (typeof item !== 'object' || item === null) return [item];
                    return headers.map(key => {
                        let val = item[key];
                        if (val === null || val === undefined) return '';
                        if (typeof val === 'object') return JSON.stringify(val);
                        return val;
                    });
                });
                renderTable(headers, currentData);
                updateUIState(currentData.length);
            } catch (err) { console.error(err); alert(`處理錯誤`); }
        }

        function getDelimiter() {
            const val = delimiterSelect.value;
            if (val === 'tab') return '\t';
            if (val === 'custom') return customDelimiter.value || ',';
            return val;
        }

        function processCSV(text) {
            currentData = [];
            headers = [];
            hiddenColumns.clear();
            updateColVisStyles();

            try {
                const delimiter = getDelimiter();
                const arr = [];
                let quote = false;
                let col = 0, row = 0;
                arr[row] = arr[row] || [];
                arr[row][col] = '';

                for (let i = 0; i < text.length; i++) {
                    let cur = text[i];
                    let next = text[i+1];
                    if (cur === '"' && quote && next === '"') { arr[row][col] += '"'; i++; continue; }
                    if (cur === '"') { quote = !quote; continue; }
                    if (!quote && text.substr(i, delimiter.length) === delimiter) {
                        i += delimiter.length - 1;
                        col++; arr[row][col] = ''; continue;
                    }
                    if ((cur === '\r' || cur === '\n') && !quote) {
                        if (cur === '\r' && next === '\n') i++;
                        row++; col = 0; arr[row] = arr[row] || []; arr[row][col] = ''; continue;
                    }
                    arr[row][col] += cur;
                }
                if (arr.length > 0 && arr[arr.length-1].length === 1 && arr[arr.length-1][0] === '') arr.pop();
                if (arr.length === 0) { alert('無效內容'); return; }

                if (headerCheck.checked) {
                    headers = arr[0];
                    currentData = arr.slice(1);
                } else {
                    headers = Array.from({length: arr[0].length}, (_, i) => `Col ${i+1}`);
                    currentData = arr;
                }
                renderTable(headers, currentData);
                updateUIState(currentData.length);
            } catch (err) { alert('CSV 解析錯誤'); }
        }

        function updateUIState(count) {
            emptyState.style.display = 'none';
            dataTable.classList.remove('hidden');
            toolbar.classList.remove('hidden');
            recordCount.innerText = `共 ${count} 筆`;
            tableContainer.scrollLeft = 0;
        }

        // --- Column Visibility Logic ---

        function updateColVisMenu() {
            colVisOptions.innerHTML = '';
            headers.forEach((header, index) => {
                const div = document.createElement('div');
                div.className = 'flex items-center hover:bg-gray-100 p-1 rounded cursor-pointer';
                const isHidden = hiddenColumns.has(index);
                
                div.innerHTML = `
                    <input type="checkbox" id="col-check-${index}" ${!isHidden ? 'checked' : ''} class="h-4 w-4 text-indigo-600 rounded cursor-pointer">
                    <label for="col-check-${index}" class="ml-2 text-sm text-gray-700 cursor-pointer select-none truncate flex-1" title="${escapeHtml(header)}">${escapeHtml(header)}</label>
                `;
                
                div.addEventListener('click', (e) => {
                    // Toggle if clicked on container, or let checkbox handle it
                    const checkbox = div.querySelector('input');
                    if (e.target !== checkbox) {
                        e.preventDefault();
                        checkbox.checked = !checkbox.checked;
                    }
                    toggleColumn(index, !checkbox.checked); // If checked=false, means hide
                });
                
                colVisOptions.appendChild(div);
            });
        }

        function toggleColumn(index, hide) {
            if (hide) hiddenColumns.add(index);
            else hiddenColumns.delete(index);
            updateColVisStyles();
        }

        function updateColVisStyles() {
            if (hiddenColumns.size === 0) {
                colVisStyles.innerHTML = '';
                return;
            }
            // Generate CSS to hide specific columns by class name
            const rules = Array.from(hiddenColumns).map(i => `.col-idx-${i} { display: none !important; }`).join('\n');
            colVisStyles.innerHTML = rules;
        }

        // --- Rendering ---

        function renderTable(headers, rows) {
            // Update Menu
            updateColVisMenu();

            tableHeader.innerHTML = '';
            
            const thNo = document.createElement('th');
            thNo.className = 'px-3 py-3 text-center text-xs font-bold text-gray-500 bg-gray-100 sticky left-0 z-40 border-b border-gray-200 sticky-left-shadow min-w-[50px]';
            thNo.innerText = '#';
            tableHeader.appendChild(thNo);

            headers.forEach((header, index) => {
                const th = document.createElement('th');
                // Added class col-idx-${index} for visibility control
                th.className = `px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer select-none hover:bg-gray-100 transition-colors group whitespace-nowrap border-b border-gray-200 col-idx-${index}`;
                th.onclick = () => sortTable(index);
                th.innerHTML = `<div class="flex items-center space-x-1"><span>${escapeHtml(header)}</span><i class="fas fa-sort sort-icon text-gray-400 group-hover:text-gray-600 ml-1"></i></div>`;
                tableHeader.appendChild(th);
            });

            tableBody.innerHTML = '';
            const fragment = document.createDocumentFragment();

            rows.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-indigo-50 transition-colors duration-150';
                
                const tdNo = document.createElement('td');
                tdNo.className = 'px-3 py-3 whitespace-nowrap text-xs text-gray-500 font-mono text-center border-b border-gray-100 sticky left-0 z-20 sticky-left-shadow bg-gray-50 cursor-pointer hover:bg-indigo-100 hover:text-indigo-700'; 
                tdNo.textContent = rowIndex + 1;
                tdNo.title = "點擊複製行號";
                tr.appendChild(tdNo);

                for (let i = 0; i < headers.length; i++) {
                    const td = document.createElement('td');
                    // Added class col-idx-${i} for visibility control
                    td.className = `px-4 py-3 whitespace-nowrap text-sm text-gray-700 border-b border-gray-100 cursor-pointer hover:bg-indigo-100 hover:text-indigo-900 transition-colors max-w-xs truncate col-idx-${i}`;
                    
                    let cellValue = row[i];
                    td.textContent = (cellValue === undefined || cellValue === null) ? '' : cellValue;
                    td.title = td.textContent;
                    tr.appendChild(td);
                }
                fragment.appendChild(tr);
            });
            tableBody.appendChild(fragment);
        }

        function filterTable(term) {
            if (!term) {
                renderTableBodyOnly(currentData);
                recordCount.innerText = `共 ${currentData.length} 筆`;
                return;
            }
            const filtered = currentData.filter(row => row.some(cell => String(cell).toLowerCase().includes(term)));
            renderTableBodyOnly(filtered);
            recordCount.innerText = `搜尋結果：${filtered.length} 筆`;
        }
        
        function renderTableBodyOnly(rows) {
            tableBody.innerHTML = '';
            const fragment = document.createDocumentFragment();
            rows.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-indigo-50 transition-colors duration-150';
                const tdNo = document.createElement('td');
                tdNo.className = 'px-3 py-3 whitespace-nowrap text-xs text-gray-500 font-mono text-center border-b border-gray-100 sticky left-0 z-20 sticky-left-shadow bg-gray-50 cursor-pointer hover:bg-indigo-100'; 
                tdNo.textContent = rowIndex + 1;
                tr.appendChild(tdNo);
                for (let i = 0; i < headers.length; i++) {
                    const td = document.createElement('td');
                    // Added col-idx-${i} here too
                    td.className = `px-4 py-3 whitespace-nowrap text-sm text-gray-700 border-b border-gray-100 cursor-pointer hover:bg-indigo-100 max-w-xs truncate col-idx-${i}`;
                    let val = row[i];
                    td.textContent = (val === undefined || val === null) ? '' : val;
                    td.title = td.textContent;
                    tr.appendChild(td);
                }
                fragment.appendChild(tr);
            });
            tableBody.appendChild(fragment);
        }

        function sortTable(colIndex) {
            const ths = tableHeader.querySelectorAll('th');
            // ths[0] is #, so data columns start from index 1. 
            // The th corresponding to colIndex is ths[colIndex + 1]
            // We need to clear icons from ALL data columns
            for(let i=1; i<ths.length; i++) {
                ths[i].classList.remove('sorted-asc', 'sorted-desc');
            }
            
            const currentTh = ths[colIndex + 1]; 

            if (sortCol === colIndex) sortAsc = !sortAsc;
            else { sortCol = colIndex; sortAsc = true; }

            currentTh.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
            
            const sorted = [...currentData].sort((a, b) => {
                let valA = a[colIndex] || '';
                let valB = b[colIndex] || '';
                const numA = parseFloat(valA);
                const numB = parseFloat(valB);
                if (!isNaN(numA) && !isNaN(numB) && !/^\s*$/.test(valA) && !/^\s*$/.test(valB)) {
                    return sortAsc ? numA - numB : numB - numA;
                }
                return sortAsc ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
            });

            renderTableBodyOnly(sorted);
            if (searchInput.value) filterTable(searchInput.value.toLowerCase());
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
    </script>
